services:
  postgres:
    image: postgres:16-alpine
    container_name: smartpos-postgres
    environment:
      POSTGRES_DB: smartpos
      POSTGRES_USER: smartpos
      POSTGRES_PASSWORD: smartpos
    ports:
      - "55432:5432"
    volumes:
      - smartpos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartpos -d smartpos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: smartpos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  smartpos_pgdata:
